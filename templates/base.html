<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard 360{% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/">
      <i class="bi bi-shield-fill-check me-2"></i>PHISHGUARD<span>_360</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <i class="bi bi-list" style="color:var(--green)"></i>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='index' %}active{% endif %}" href="/">
            <i class="bi bi-terminal me-1"></i>HOME
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='scanner' %}active{% endif %}" href="/scanner">
            <i class="bi bi-search me-1"></i>SCANNER
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='session' %}active{% endif %}" href="/session">
            <i class="bi bi-shield-lock me-1"></i>SESSION
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='susceptibility' %}active{% endif %}" href="/susceptibility">
            <i class="bi bi-people me-1"></i>BEHAVIOR
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='history' %}active{% endif %}" href="/history">
            <i class="bi bi-clock-history me-1"></i>HISTORY
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="py-4">
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</main>

<footer class="py-3 text-center mt-5">
  <small class="prompt">PHISHGUARD_360 // CSEC594 SECURITY CAPSTONE // DEPAUL UNIVERSITY // SPRING 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
